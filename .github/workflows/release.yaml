name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      # The generated-against date = the commit date of the committed spec
      # snapshot. GoReleaser bakes it into the binary and into the release notes
      # (see .goreleaser.yaml). Requires fetch-depth: 0 (full history) above.
      - name: Compute spec date
        run: echo "GB_SPEC_DATE=$(git log -1 --format=%cs -- .speakeasy/out.openapi.yaml)" >> "$GITHUB_ENV"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-artifacts
          path: |
            dist/
            !dist/*.txt
          retention-days: 30
