name: Auto-tag release

# Step 4 of the release flow: once the Speakeasy version-bump PR is approved and
# merged to main, read the new version and push a matching `v<version>` tag,
# which triggers release.yaml (GoReleaser + npm publish).
#
# IMPORTANT: the tag is pushed with a PAT (RELEASE_TAG_PAT), NOT the default
# GITHUB_TOKEN. A tag pushed by GITHUB_TOKEN does NOT trigger other workflows
# (GitHub blocks recursive workflow runs), so release.yaml would never fire.
# The PAT needs `contents: write` on this repo. (A GitHub App token via
# actions/create-github-app-token is the more robust alternative to a PAT.)
#
# Armed by the `RELEASE_AUTOMATION` repo variable so it stays dormant during the
# @next staging phase (where prerelease tags are pushed by hand). Set the
# variable to "true" at GA cutover.

on:
  push:
    branches: [main]
    paths:
      - .speakeasy/gen.lock

permissions:
  contents: write

jobs:
  tag:
    if: vars.RELEASE_AUTOMATION == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TAG_PAT }}

      - name: Read release version
        id: ver
        run: |
          VERSION=$(awk -F': *' '/^[[:space:]]*releaseVersion:/ {print $2; exit}' .speakeasy/gen.lock)
          if [ -z "$VERSION" ]; then
            echo "could not read releaseVersion from .speakeasy/gen.lock" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push tag if it does not exist yet
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists — nothing to release."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          echo "Pushed v${VERSION} → release.yaml will build + publish."
