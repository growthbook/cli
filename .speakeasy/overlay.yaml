  - target: $..[?(@.operationId=="listRevisions")]
    update: { tags: [feature-revisions-v1] }
  - target: $..[?(@.operationId=="postFeatureRevisionDiscard")].tags
    remove: true
  - target: $..[?(@.operationId=="postFeatureRevisionDiscard")]
    update: { tags: [feature-revisions-v1] }
  - target: $..[?(@.operationId=="postFeatureRevisionPublish")].tags
