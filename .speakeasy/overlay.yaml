        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.factTableFilters }
  - target: $..[?(@.operationId=="listAggregatedTableRuns")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.runs }
  - target: $..[?(@.operationId=="listFactMetrics")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.factMetrics }
  - target: $..[?(@.operationId=="listCodeRefs")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.codeRefs }
  - target: $..[?(@.operationId=="listMembers")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.members }
  - target: $..[?(@.operationId=="listReports")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
