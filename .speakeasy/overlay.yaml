overlay: 1.0.0
info:
  title: GrowthBook CLI codegen fixes
  version: 0.0.1
actions:
  # Feature-value "simple schema" type enum.
  # object/object[] and primitive/primitive[] normalize to the same Go
  # identifier; give each member an explicit, distinct name.
  - target: $..simple.properties.type
    update:
      x-speakeasy-enums:
        - Object
        - ObjectArray
        - Primitive
        - PrimitiveArray
  # Attribute datatype enum (request bodies — carry a description).
  # string/string[], number/number[], secureString/secureString[] collide.
  - target: $..[?(@.enum && @.description=="The attribute datatype")]
    update:
      x-speakeasy-enums:
        - Boolean
        - String
        - Number
        - SecureString
        - Enum
        - StringArray
        - NumberArray
        - SecureStringArray
  # Same datatype enum on the Attribute response model (no description).
  - target: $.components.schemas.Attribute.properties.datatype
    update:
      x-speakeasy-enums:
        - Boolean
        - String
        - Number
        - SecureString
        - Enum
        - StringArray
        - NumberArray
        - SecureStringArray
  # The feature/saved-group revision "version" path parameter is
  # `anyOf: [integer, "new"]`. Path parameters must be scalar, so Speakeasy
  # skips every operation that uses it (~30 revision endpoints). On the wire a
  # path value is always a string (the back-end coerces it), so present it as a
  # plain string. First drop the anyOf, then set the scalar type.
  - target: $..[?(@.name=="version" && @.in=="path")].schema.anyOf
    remove: true
  - target: $..[?(@.name=="version" && @.in=="path")].schema
    update:
      type: string
      description: Revision version number, or "new" to auto-create a draft (only where supported).
  # The "usage" API tag generates a Go package `internal/cli/usage`, which
  # collides with Speakeasy's reserved framework package `internal/usage`
  # (powers --usage/schema), breaking compilation. Move the single usage
  # endpoint into a differently-named command group.
  - target: $["paths"]["/v1/usage/metrics"]["get"]
    update:
      x-speakeasy-group: usageMetrics
      x-speakeasy-name-override: get
  # Friendlier feature command names: make the latest (v2) surface the plain
  # `features` group and demote the old v1 surface to `features-v1` (deprecated).
  # The group name (both the SDK namespace and the CLI command group) is driven
  # by the operation's *tag*, so we rewrite the tags rather than layer on
  # x-speakeasy-group (which, left alongside the original tag, makes the
  # generator emit conflicting namespaces). x-speakeasy-name-override pins the
  # leaf names, since the generator's operationId heuristic is inconsistent (it
  # left the v2 leaves as `get-feature-v2` etc.). Generalizes to future bumps:
  # when v3 lands, `features` points at v3 and the previous version → `features-v2`.
  # Top-level tag definitions get renamed too so --help descriptions line up.
  # Order matters: demote v1 first, then promote v2, so the second rename can't
  # re-match the name the first one just created.
  - target: $..[?(@.name=="features" && @.description)]
    update: { name: features-v1 }
  - target: $..[?(@.name=="features-v2" && @.description)]
    update: { name: features }
  # Each op: first `remove` the original tags array (overlay `update` MERGES
  # arrays — it would append, leaving the op in both the old and new group and
  # causing duplicate-operation-name collisions), then set the new tag + leaf.
  # v2 -> `features` (the latest)
  - target: $..[?(@.operationId=="listFeaturesV2")].tags
    remove: true
  - target: $..[?(@.operationId=="listFeaturesV2")]
    update: { tags: [features], x-speakeasy-name-override: list }
  - target: $..[?(@.operationId=="postFeatureV2")].tags
    remove: true
  - target: $..[?(@.operationId=="postFeatureV2")]
    update: { tags: [features], x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="getFeatureV2")].tags
    remove: true
  - target: $..[?(@.operationId=="getFeatureV2")]
    update: { tags: [features], x-speakeasy-name-override: get }
  - target: $..[?(@.operationId=="updateFeatureV2")].tags
    remove: true
  - target: $..[?(@.operationId=="updateFeatureV2")]
    update: { tags: [features], x-speakeasy-name-override: update }
  - target: $..[?(@.operationId=="deleteFeatureV2")].tags
    remove: true
  - target: $..[?(@.operationId=="deleteFeatureV2")]
    update: { tags: [features], x-speakeasy-name-override: delete }
  - target: $..[?(@.operationId=="toggleFeatureV2")].tags
    remove: true
  - target: $..[?(@.operationId=="toggleFeatureV2")]
    update: { tags: [features], x-speakeasy-name-override: toggle }
  - target: $..[?(@.operationId=="revertFeatureV2")].tags
    remove: true
  - target: $..[?(@.operationId=="revertFeatureV2")]
    update: { tags: [features], x-speakeasy-name-override: revert }
  - target: $..[?(@.operationId=="getFeatureKeysV2")].tags
    remove: true
  - target: $..[?(@.operationId=="getFeatureKeysV2")]
    update: { tags: [features], x-speakeasy-name-override: get-feature-keys }
  - target: $..[?(@.operationId=="getFeatureStaleV2")].tags
    remove: true
  - target: $..[?(@.operationId=="getFeatureStaleV2")]
    update: { tags: [features], x-speakeasy-name-override: get-feature-stale }
  # v1 -> `features-v1` (legacy; a startup hook warns when it's used)
  - target: $..[?(@.operationId=="listFeatures")].tags
    remove: true
  - target: $..[?(@.operationId=="listFeatures")]
    update: { tags: [features-v1], x-speakeasy-name-override: list }
  - target: $..[?(@.operationId=="postFeature")].tags
    remove: true
  - target: $..[?(@.operationId=="postFeature")]
    update: { tags: [features-v1], x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="getFeature")].tags
    remove: true
  - target: $..[?(@.operationId=="getFeature")]
    update: { tags: [features-v1], x-speakeasy-name-override: get }
  - target: $..[?(@.operationId=="updateFeature")].tags
    remove: true
  - target: $..[?(@.operationId=="updateFeature")]
    update: { tags: [features-v1], x-speakeasy-name-override: update }
  - target: $..[?(@.operationId=="deleteFeature")].tags
    remove: true
  - target: $..[?(@.operationId=="deleteFeature")]
    update: { tags: [features-v1], x-speakeasy-name-override: delete }
  - target: $..[?(@.operationId=="toggleFeature")].tags
    remove: true
  - target: $..[?(@.operationId=="toggleFeature")]
    update: { tags: [features-v1], x-speakeasy-name-override: toggle }
  - target: $..[?(@.operationId=="revertFeature")].tags
    remove: true
  - target: $..[?(@.operationId=="revertFeature")]
    update: { tags: [features-v1], x-speakeasy-name-override: revert }
  - target: $..[?(@.operationId=="getFeatureKeys")].tags
    remove: true
  - target: $..[?(@.operationId=="getFeatureKeys")]
    update: { tags: [features-v1], x-speakeasy-name-override: get-feature-keys }
  - target: $..[?(@.operationId=="getFeatureStale")].tags
    remove: true
  - target: $..[?(@.operationId=="getFeatureStale")]
    update: { tags: [features-v1], x-speakeasy-name-override: get-feature-stale }
  # The security-scheme descriptions carry a fenced ```bash curl example. The CLI
  # renders securityScheme.description as the --bearer-auth/--username/--password
  # flag help (and in `whoami`), where the code fences and multi-line curl garble
  # the terminal output. Replace them with concise single-line help. (Kept in the
  # overlay, not the public spec, since this is a CLI-presentation fix.)
  # No backticks here: pflag treats the first backtick-quoted run in a flag's
  # usage string as the value placeholder, so a backticked example would replace
  # the "string" arg name in --help.
  # basicAuth has TWO credential fields, so Speakeasy appends the field name
  # ("username"/"password") after this description in the flag help and the
  # README env-var table (bearerAuth, single-field, gets no append). Keep the
  # sentence from ENDING in "password" or the password row reads "...password. password".
  - target: $.components.securitySchemes.bearerAuth.description
    update: "Bearer auth token: your Secret Key or Personal Access Token, sent as an Authorization Bearer header."
  - target: $.components.securitySchemes.basicAuth.description
    update: "HTTP Basic auth: use your GrowthBook Secret Key as the username and leave the password empty."
  # The full API description (auth/errors/versioning prose) is dumped verbatim
  # into the top-level `--help` as the root command's long description, which is
  # far too long for CLI help. Trim to a concise summary. (This also drives the
  # README's auto-managed Summary section; the hand-written sections above it are
  # preserved.) Overlay-only so the public spec keeps the full description.
  - target: $.info.description
    update: |-
      A command-line interface for GrowthBook — manage feature flags, experiments, metrics, and more from your terminal.

      Endpoints are versioned by path prefix: `/v1` (stable) and `/v2` (improved shapes). Each command group targets the newest version of its endpoint; superseded versions remain available under a `-vN` suffix.

      Authenticate with a Secret Key or Personal Access Token via `--bearer-auth` (or the `GBCLI_BEARER_AUTH` environment variable). Run `growthbook configure` to store credentials, or `growthbook whoami` to check the active configuration.
  # Client-side auto-pagination. Every collection endpoint takes the shared
  # limit/offset query params and returns `{<resource>: [...], ...PaginationFields}`.
  # Declaring x-speakeasy-pagination (offsetLimit) makes Speakeasy generate a
  # `--all` (+ `--max-pages`) flag that walks pages by incrementing offset until a
  # short page is returned. `--skip-pagination` stays a separate, server-side knob
  # (self-hosted only). `outputs.results` differs per op (the array key); the
  # offset/limit inputs are identical, so they share a YAML anchor. `name` matches
  # the shared parameter component names (limit/offset), `in: parameters`.
  - target: $..[?(@.operationId=="listFeatures")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: &offsetLimitInputs
          - { name: offset, in: parameters, type: offset }
          - { name: limit, in: parameters, type: limit }
        outputs: { results: $.features }
  - target: $..[?(@.operationId=="listFeaturesV2")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.features }
  - target: $..[?(@.operationId=="listExperiments")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.experiments }
  - target: $..[?(@.operationId=="listExperimentResults")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.experimentResults }
  - target: $..[?(@.operationId=="listMetrics")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.metrics }
  - target: $..[?(@.operationId=="listSegments")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.segments }
  - target: $..[?(@.operationId=="listDimensions")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.dimensions }
  - target: $..[?(@.operationId=="listSdkConnections")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.connections }
  - target: $..[?(@.operationId=="listDataSources")]
    update:
      x-speakeasy-pagination:
