        outputs: { results: $.reports }
  - target: $..[?(@.operationId=="listNamespaces")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.namespaces }
  - target: $..[?(@.operationId=="getNamespaceMemberships")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.experiments }
  # These paginate identically but INLINE the pagination fields in the response
  # instead of $ref-ing PaginationFields, so they don't show up in a
  # PaginationFields search — enumerate them explicitly. Every revision list uses
  # `revisions`; the rest use their resource name.
  - target: $..[?(@.operationId=="listProjects")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.projects }
  - target: $..[?(@.operationId=="listOrganizations")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
