        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.rampSchedules }
  - target: $..[?(@.operationId=="listRevisions")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.revisions }
  - target: $..[?(@.operationId=="getFeatureRevisions")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.revisions }
  - target: $..[?(@.operationId=="listRevisionsV2")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.revisions }
