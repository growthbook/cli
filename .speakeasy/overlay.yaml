    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.revisions }
  - target: $..[?(@.operationId=="getConstantRevisions")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.revisions }
  # Verb consistency: the create/update primaries default to the HTTP-method
  # leaf (`post`/`put`). Rename to `create`/`update` to match the friendly
  # features surface and the old GrowthBook CLI (`metrics create`, etc.). Each
  # group has exactly one bare create/update, so no collisions. (`delete` is
  # already friendly; the compound action ops keep their descriptive names.)
  - target: $..[?(@.operationId=="postArchetype")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postAttribute")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postConstant")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postConstantRevision")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postDimension")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postEnvironment")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postExperiment")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postFactMetric")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postFactTable")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postFeatureRevision")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postMetric")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postNamespace")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postOrganization")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postProject")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postRampSchedule")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postReport")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postSavedGroup")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postSavedGroupRevision")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postSdkConnection")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postSegment")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="postVisualChangesets")]
    update: { x-speakeasy-name-override: create }
  - target: $..[?(@.operationId=="putArchetype")]
    update: { x-speakeasy-name-override: update }
  - target: $..[?(@.operationId=="putAttribute")]
    update: { x-speakeasy-name-override: update }
  - target: $..[?(@.operationId=="putEnvironment")]
    update: { x-speakeasy-name-override: update }
  - target: $..[?(@.operationId=="putMetric")]
    update: { x-speakeasy-name-override: update }
  - target: $..[?(@.operationId=="putNamespace")]
    update: { x-speakeasy-name-override: update }
  - target: $..[?(@.operationId=="putOrganization")]
    update: { x-speakeasy-name-override: update }
