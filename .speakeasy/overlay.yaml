  # Collision fix: in each revisions group, the "get one revision" op and the
  # "list a parent's revisions" op BOTH defaulted to the leaf `get`, so one
  # shadowed the other (unreachable). Rename the per-parent list op; `get` then
  # resolves unambiguously to the single-revision fetch.
  - target: $..[?(@.operationId=="getFeatureRevisions")]
    update: { x-speakeasy-name-override: list-for-feature }
  - target: $..[?(@.operationId=="getConstantRevisions")]
    update: { x-speakeasy-name-override: list-for-constant }
  - target: $..[?(@.operationId=="getSavedGroupRevisions")]
    update: { x-speakeasy-name-override: list-for-saved-group }
  - target: $..[?(@.operationId=="getConfigRevisions")]
    update: { x-speakeasy-name-override: list-for-config }
  # feature-revisions v1/v2 inversion — make the LATEST (v2) own the plain
  # `feature-revisions` group and demote v1 to `feature-revisions-v1`, matching
  # the features convention ("latest owns the plain name"). Same tag-rewrite
  # mechanism as the features block: rename the two tag DEFINITIONS (demote v1
  # first so the promote can't re-match), then per op `remove` the tags array
  # (update MERGES arrays) and set the new tag. For the v2 leaves we pin a clean
  # verb via x-speakeasy-name-override (publish, discard, add-rule, set-metadata,
  # …) instead of the operationId-derived `post-feature-revision-*` mouthful —
  # the `feature-revisions` group already supplies the context, so the leaf only
  # needs the action. v1 leaves keep the verbose names (deprecated; the friction
  # nudges users onto v2). NOTE: this pins names per-operation, so any NEW v2
  # revision op will appear as its raw operationId until it gets an override here.
  - target: $..[?(@.name=="feature-revisions" && @.description)]
    update: { name: feature-revisions-v1 }
  - target: $..[?(@.name=="feature-revisions-v2" && @.description)]
    update: { name: feature-revisions }
  # v1 ops -> feature-revisions-v1 (leaves unchanged; create/list-for-feature
  # overrides from the blocks above persist through the retag).
  - target: $..[?(@.operationId=="postFeatureRevision")].tags
    remove: true
  - target: $..[?(@.operationId=="postFeatureRevision")]
    update: { tags: [feature-revisions-v1] }
  - target: $..[?(@.operationId=="deleteFeatureRevisionRule")].tags
    remove: true
  - target: $..[?(@.operationId=="deleteFeatureRevisionRule")]
    update: { tags: [feature-revisions-v1] }
  - target: $..[?(@.operationId=="deleteFeatureRevisionRuleRampSchedule")].tags
    remove: true
  - target: $..[?(@.operationId=="deleteFeatureRevisionRuleRampSchedule")]
    update: { tags: [feature-revisions-v1] }
  - target: $..[?(@.operationId=="getFeatureRevision")].tags
    remove: true
  - target: $..[?(@.operationId=="getFeatureRevision")]
    update: { tags: [feature-revisions-v1] }
  - target: $..[?(@.operationId=="getFeatureRevisionLatest")].tags
    remove: true
  - target: $..[?(@.operationId=="getFeatureRevisionLatest")]
    update: { tags: [feature-revisions-v1] }
  - target: $..[?(@.operationId=="getFeatureRevisionMergeStatus")].tags
    remove: true
  - target: $..[?(@.operationId=="getFeatureRevisionMergeStatus")]
    update: { tags: [feature-revisions-v1] }
  - target: $..[?(@.operationId=="getFeatureRevisions")].tags
