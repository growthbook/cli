        inputs: *offsetLimitInputs
        outputs: { results: $.savedGroups }
  - target: $..[?(@.operationId=="listConstants")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.constants }
  - target: $..[?(@.operationId=="listFactTables")]
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs: *offsetLimitInputs
        outputs: { results: $.factTables }
  - target: $..[?(@.operationId=="listFactTableFilters")]
    update:
